<!DOCTYPE html>
<html>
<head>
 <style>
   body { margin: 0; background: #050505; overflow: hidden; font-family: sans-serif; }
   canvas { display: block; image-rendering: pixelated; cursor: crosshair; }
  
   #top-bar {
     position: fixed; top: 0; left: 0; width: 100%;
     background: #1a1a1a; border-bottom: 2px solid #333;
     z-index: 100; transition: transform 0.3s ease;
   }
   #top-bar.minimized { transform: translateY(-80%); }
  
   .content { padding: 10px 20px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
   .btn-group { display: flex; gap: 5px; border-right: 1px solid #444; padding-right: 15px; flex-wrap: wrap; }
   .size-controls { display: flex; align-items: center; gap: 10px; padding-left: 10px; }
  
   button {
     padding: 8px 16px; cursor: pointer; background: #2a2a2a;
     color: #aaa; border: 1px solid #444; border-radius: 4px;
     font-size: 11px; font-weight: bold;
   }
   button.active { background: #008cff; color: white; border-color: #00a2ff; }
   button#btnFire.active { background: #ff4400; border-color: #ff6600; }
   button#btnWood.active { background: #5d4037; border-color: #8d6e63; }
   button#btnSand.active { background: #e3c042; color: #000; border-color: #c9a72c; }
   button#btnOil.active { background: #2b2b2b; color: #fff; border-color: #000; }
   button#btnCoal.active { background: #111; color: #fff; border-color: #000; }
   button#btnSnow.active { background: #e0e0e0; color: #000; border-color: #fff; }
   /* NEW BUTTON STYLES */
   button#btnSoil.active { background: #5c3a21; color: #fff; border-color: #3e2615; }
   button#btnSeed.active { background: #c2a878; color: #000; border-color: #a38959; }
   button#btnPlant.active { background: #4caf50; color: #fff; border-color: #2e7d32; }
  
   #sizeDisplay { color: #008cff; font-family: monospace; font-size: 12px; min-width: 50px; }
  
   #toggle-btn {
     position: absolute; bottom: -25px; right: 20px;
     background: #1a1a1a; border: 2px solid #333; border-top: none;
     border-radius: 0 0 5px 5px; height: 25px; cursor: pointer; color: #555;
   }
 </style>
</head>
<body>
 <div id="top-bar">
   <div class="content">
     <div class="btn-group">
       <button id="btnWater" class="active" onclick="setMode('water')">WATER</button>
       <button id="btnFire" onclick="setMode('fire')">FIRE</button>
       <button id="btnWood" onclick="setMode('wood')">WOOD</button>
       <button id="btnSand" onclick="setMode('sand')">SAND</button>
       <button id="btnSoil" onclick="setMode('soil')">SOIL</button>
       <button id="btnSeed" onclick="setMode('seed')">SEED</button>
       <button id="btnPlant" onclick="setMode('plant')">PLANT</button>
       <button id="btnOil" onclick="setMode('oil')">OIL</button>
       <button id="btnCoal" onclick="setMode('coal')">COAL</button>
       <button id="btnSnow" onclick="setMode('snow')">SNOW</button>
       <button id="btnWall" onclick="setMode('wall')">WALL</button>
       <button id="btnEraser" onclick="setMode('eraser')">ERASER</button>
     </div>

     <div class="size-controls">
       <button onclick="changeBrushSize(-1)">-</button>
       <span id="sizeDisplay">SIZE: 2</span>
       <button onclick="changeBrushSize(1)">+</button>
     </div>

     <button onclick="resetGrid()" style="margin-left: auto; color: #ff4444;">PURGE GRID</button>
   </div>
   <button id="toggle-btn" onclick="toggleUI()">▲</button>
 </div>
 <canvas id="sim"></canvas>

 <script src="fire.js"></script>
 <script src="wood.js"></script>
 <script src="sand.js"></script>
 <script src="oil.js"></script>
 <script src="coal.js"></script>
 <script src="snow.js"></script>
 <script src="soil.js"></script>
 <script src="plant.js"></script>
 <script src="seed.js"></script>
 <script src="script.js"></script>
</body>
</html>
